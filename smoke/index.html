<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smoke Cursor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        cursor: none;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      let mouse = { x: 0, y: 0, px: 0, py: 0 };
      let hue = 0;
      let particles = [];

      document.addEventListener("mousemove", (e) => {
        mouse.px = mouse.x;
        mouse.py = mouse.y;
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        hue += 3.5;

        const count = 25;
        for (let i = 0; i < count; i++) {
          particles.push(new Particle(mouse.x, mouse.y, hue));
        }
      });
      document.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          mouse.px = mouse.x;
          mouse.py = mouse.y;
          mouse.x = touch.clientX;
          mouse.y = touch.clientY;
          hue += 1.5;

          for (let i = 0; i < 8; i++) {
            particles.push(new Particle(mouse.x, mouse.y, hue));
          }
        },
        { passive: false },
      );

      class Particle {
        constructor(x, y, hue) {
          this.x = x + (Math.random() - 0.5) * 10;
          this.y = y + (Math.random() - 0.5) * 10;
          this.hue = hue + Math.random() * 30 - 15;
          this.size = Math.random() * 30 + 8;
          this.speedX = (Math.random() - 0.5) * 2;
          this.speedY = (Math.random() - 0.5) * 2 - 1;
          this.life = 1;
          this.decay = Math.random() * 0.015 + 0.008;
          this.turbX = (Math.random() - 0.5) * 0.3;
          this.turbY = (Math.random() - 0.5) * 0.3;
        }

        update() {
          this.speedX += this.turbX;
          this.speedY += this.turbY;
          this.speedX *= 0.98;
          this.speedY *= 0.98;
          this.x += this.speedX;
          this.y += this.speedY;
          this.life -= this.decay;
          this.size += 0.3;
        }

        draw() {
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          const gradient = ctx.createRadialGradient(
            this.x,
            this.y,
            0,
            this.x,
            this.y,
            this.size,
          );
          gradient.addColorStop(
            0,
            `hsla(${this.hue + 40}, 100%, 80%, ${this.life * 0.6})`,
          );
          gradient.addColorStop(
            0.4,
            `hsla(${this.hue}, 100%, 55%, ${this.life * 0.35})`,
          );
          gradient.addColorStop(1, `hsla(${this.hue - 20}, 100%, 30%, 0)`);

          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function animate() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        particles = particles.filter((p) => p.life > 0);
        particles.forEach((p) => {
          p.update();
          p.draw();
        });

        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
